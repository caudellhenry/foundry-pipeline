name: foundry-install-workspace-syntax
description: foundry-install-workspace.sh passes bash -n and --help prints expected sections
test_cmd: |
  failed=0
  bash -n packages/core/scripts/foundry-install-workspace.sh || failed=1
  help=$(bash packages/core/scripts/foundry-install-workspace.sh --help 2>&1)
  echo "$help" | grep -q 'workspace install pattern' || failed=1
  echo "$help" | grep -q '\-\-source=' || failed=1
  echo "$help" | grep -q '\-\-copy' || failed=1
  echo "$help" | grep -q '\-\-harness=' || failed=1
  exit $failed
expected_exit: 0
pass_k: 1
release_gating: true