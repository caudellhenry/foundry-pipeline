name: install-scripts-hermes-dry
description: hermes install --source=this-repo --uninstall dry-run works against a temp HOME
test_cmd: |
  TMPHOME=$(mktemp -d)
  HERMES_SKILLS_DIR="$TMPHOME/.hermes/skills" \
    bash packages/hermes/install.sh --source="$PWD" >/dev/null
  installed_count=$(find "$TMPHOME/.hermes/skills" -maxdepth 1 -name 'foundry-*' -type l | wc -l | tr -d ' ')
  test "$installed_count" -ge 10
  HERMES_SKILLS_DIR="$TMPHOME/.hermes/skills" \
    bash packages/hermes/install.sh --source="$PWD" --uninstall >/dev/null
  remaining=$(find "$TMPHOME/.hermes/skills" -maxdepth 1 -name 'foundry-*' -type l | wc -l | tr -d ' ')
  test "$remaining" -eq 0
  rm -rf "$TMPHOME"
expected_exit: 0
pass_k: 1
release_gating: false